name: Weekly Picks

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  send-picks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install scipy numpy requests
      - name: Send weekly picks
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: python src/weekly_picks.py
